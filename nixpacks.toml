[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "php82Extensions.pdo_mysql", "php82Extensions.bcmath", "nodejs", "npm"]

[phases.build]
cmds = ["composer install --no-dev", "npm install", "npm run build"]

[phases.deploy]
# Ensure migrations run *after* build but *before* the app starts
# Railway's Nixpacks will run this during the release phase
releaseCmd = "php artisan migrate --force"
startCmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
